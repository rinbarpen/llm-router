version: '3.8'

services:
  llm-router:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: llm-router-backend
    expose:
      - "18000"
    environment:
      - LLM_ROUTER_HOST=${LLM_ROUTER_HOST:-0.0.0.0}
      - LLM_ROUTER_PORT=${LLM_ROUTER_PORT:-18000}
      - LLM_ROUTER_SQLITE_PATH=${LLM_ROUTER_SQLITE_PATH:-/app/data/llm_router.db}
      - LLM_ROUTER_MIGRATE_FROM_SQLITE=${LLM_ROUTER_MIGRATE_FROM_SQLITE:-true}
      - LLM_ROUTER_SQLITE_MAIN_PATH=/app/data/llm_router.db
      - LLM_ROUTER_SQLITE_MONITOR_PATH=/app/data/llm_datas.db
      - LLM_ROUTER_MODEL_STORE=/app/data/models
      - LLM_ROUTER_REQUIRE_AUTH=${LLM_ROUTER_REQUIRE_AUTH:-true}

      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}
      - DASHSCOPE_API_KEY=${DASHSCOPE_API_KEY:-}
      - GLM_API_KEY=${GLM_API_KEY:-}
      - KIMI_API_KEY=${KIMI_API_KEY:-}
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY:-}
    volumes:
      - ./router.toml:/app/router.toml:ro
      - ./.env:/app/.env:ro
      - ./data:/app/data
      - monitor-dist:/app/monitor-dist
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:18000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s
    networks:
      - llm-router-network

  nginx:
    image: nginx:alpine
    container_name: llm-router-nginx
    ports:
      - "4022:4022"
    volumes:
      - monitor-dist:/usr/share/nginx/html:ro
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - llm-router
    restart: unless-stopped
    networks:
      - llm-router-network

volumes:
  monitor-dist:

networks:
  llm-router-network:
    driver: bridge
