version: '3.8'

services:
  llm-router-1:
    build:
      context: ../..
      dockerfile: Dockerfile
    container_name: llm-router-backend-1
    environment:
      - LLM_ROUTER_HOST=0.0.0.0
      - LLM_ROUTER_PORT=18000
      - LLM_ROUTER_SQLITE_PATH=/app/data/llm_router.db
      - LLM_ROUTER_REQUIRE_AUTH=${LLM_ROUTER_REQUIRE_AUTH:-true}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY:-}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}
    volumes:
      - ../../router.toml:/app/router.toml:ro
      - ../../data:/app/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:18000/health"]
      interval: 20s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - llm-router-ha

  llm-router-2:
    build:
      context: ../..
      dockerfile: Dockerfile
    container_name: llm-router-backend-2
    environment:
      - LLM_ROUTER_HOST=0.0.0.0
      - LLM_ROUTER_PORT=18000
      - LLM_ROUTER_SQLITE_PATH=/app/data/llm_router.db
      - LLM_ROUTER_REQUIRE_AUTH=${LLM_ROUTER_REQUIRE_AUTH:-true}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY:-}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}
    volumes:
      - ../../router.toml:/app/router.toml:ro
      - ../../data:/app/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:18000/health"]
      interval: 20s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - llm-router-ha

  nginx:
    image: nginx:alpine
    container_name: llm-router-ha-nginx
    ports:
      - "18080:80"
    volumes:
      - ./nginx.ha.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - llm-router-1
      - llm-router-2
    restart: unless-stopped
    networks:
      - llm-router-ha

networks:
  llm-router-ha:
    driver: bridge
