# Example router configuration for llm-router
# Copy this file to router.toml and adjust as needed.

######################
# Server Settings    #
######################
# 服务器配置（可选，也可以通过环境变量 LLM_ROUTER_HOST 和 LLM_ROUTER_PORT 设置）
[server]
host = "0.0.0.0"  # 服务绑定的主机地址
port = 8000       # 服务绑定的端口

######################
# Provider Settings  #
######################

[[providers]]
name = "openai"
type = "openai"
# Environment variable that stores your OpenAI API key
api_key_env = "OPENAI_API_KEY"
base_url = "https://api.openai.com"

[[providers]]
name = "gemini"
type = "gemini"
api_key_env = "GEMINI_API_KEY"

[[providers]]
name = "claude"
type = "claude"
api_key_env = "ANTHROPIC_API_KEY"

[[providers]]
name = "openrouter"
type = "openrouter"
api_key_env = "OPENROUTER_API_KEY"

[[providers]]
name = "glm"
type = "glm"
api_key_env = "GLM_API_KEY"

[[providers]]
name = "kimi"
type = "kimi"
api_key_env = "KIMI_API_KEY"

[[providers]]
name = "qwen"
type = "qwen"
api_key_env = "DASHSCOPE_API_KEY"


###################
# OpenAI Models   #
###################

[[models]]
name = "gpt-5.1"
provider = "openai"
display_name = "GPT-5.1"
tags = ["chat", "general", "image", "audio", "reasoning", "latest"]
[models.rate_limit]
max_requests = 50
per_seconds = 60
[models.config]
context_window = "272k"
supports_vision = true
supports_tools = true
languages = ["en"]

[[models]]
name = "gpt-5-pro"
