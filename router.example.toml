# Example router configuration for llm-router
# Copy this file to router.toml and adjust as needed.

######################
# Server Settings    #
######################
# 服务器配置（可选，也可以通过环境变量 LLM_ROUTER_HOST 和 LLM_ROUTER_PORT 设置）
[server]
host = "0.0.0.0"  # 服务绑定的主机地址
port = 18000       # 服务绑定的端口

######################
# Frontend Settings #
######################
# 前端配置（可选，也可以通过环境变量 VITE_PORT、VITE_API_URL、VITE_API_BASE_URL 设置）
[frontend]
port = 4022                    # 前端开发服务器端口
api_url = "http://localhost:18000"  # 后端API服务器地址（开发环境代理用）
api_base_url = "/api"          # 生产环境API基础路径

######################
# Provider & Models  #
######################
# 注意：每个 provider 的配置和其对应的模型放在一起，便于管理
# 配置顺序不影响功能，系统会根据 provider 字段自动关联模型和 provider

###################
# OpenAI Provider #
###################

[[providers]]
name = "openai"
type = "openai"
# Environment variable that stores your OpenAI API key
api_key_env = "OPENAI_API_KEY"
base_url = "https://api.openai.com"  # 可选，如果不配置则使用默认值

[[openai.models]]
name = "gpt-5.1"
provider = "openai"
display_name = "GPT-5.1"
tags = ["chat", "general", "image", "audio", "reasoning", "latest"]
[openai.models.rate_limit]
max_requests = 50
per_seconds = 60
[openai.models.config]
context_window = "272k"
supports_vision = true
supports_tools = true
languages = ["en"]

[[openai.models]]
name = "gpt-5-pro"
provider = "openai"
display_name = "GPT-5 Pro"
tags = ["chat", "general", "image", "audio", "reasoning", "fast"]
[openai.models.rate_limit]
max_requests = 60
per_seconds = 60
[openai.models.config]
context_window = "272k"
supports_vision = true
supports_tools = true
languages = ["en"]


